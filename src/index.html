<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <!-- meta情報 -->

    <meta
      name="description"
      content="Codo Assistは、自然に囲まれた環境で快適に過ごせるグランピング施設です。焚き火やアウトドアクッキング、家族で楽しめる体験をご用意しています。"
    />
    <!-- ogp -->
    <meta
      property="og:title"
      content="Codo Assist｜自然に囲まれたグランピング体験を"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="./images/ogp.jpg" />
    <meta property="og:site_name" content="Codo Assist" />
    <meta
      property="og:description"
      content="Codo Assistは、自然に囲まれた環境で快適に過ごせるグランピング施設です。焚き火やアウトドアクッキング、家族で楽しめる体験をご用意しています。"
    />

    <meta name="robots" content="noindex, nofollow" />
    <!-- 検索エンジンにインデックスしないよう指示 -->
    <meta name="googlebot" content="noindex, nofollow" />
    <!-- Googleのクローラーにインデックスしないよう指示 -->
    <meta name="msnbot" content="noindex, nofollow" />
    <!-- Bingのクローラーにインデックスしないよう指示 -->
    <meta name="slurp" content="noindex, nofollow" />
    <!-- Yahooのクローラーにインデックスしないよう指示 -->
    <!-- ファビコン -->
    <link rel="icon" href=".images/favicon.svg" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css -->
    <link rel="stylesheet" href="./css/styles.min.css" />
  </head>
  <body>
    <header class="p-header js-header">
      <div class="p-header__inner">
        <h1 class="p-header__title">
          <a href="/" class="p-header__title-link">Codo Assist</a>
        </h1>
        <button
          class="p-header__hamburger js-hamburger"
          aria-label="メニューを開く"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="p-header__wrapper js-drawer">
          <nav class="p-header__nav">
            <ul class="p-header__nav-list">
              <li class="p-header__nav-item">
                <a href="#About" class="p-header__nav-link">About</a>
              </li>
              <li class="p-header__nav-item">
                <a href="#Service" class="p-header__nav-link">Service</a>
              </li>
              <li class="p-header__nav-item">
                <a href="#News" class="p-header__nav-link">News</a>
              </li>
              <li class="p-header__nav-item">
                <a href="#FAQ" class="p-header__nav-link">FAQ</a>
              </li>
            </ul>
          </nav>
          <div class="p-header__contact">
            <a href="#" class="p-header__contact-button c-button">Contact</a>
          </div>
        </div>
      </div>
    </header>

    <!-- MV -->
    <div class="p-mv">
      <div class="p-mv__title">
        <p class="p-mv__title-text">Glamping Site</p>
      </div>
      <ul class="p-mv__fade">
        <li class="p-mv__img">
          <picture class="p-mv__image">
            <source srcset="./images/fv-bgi2.webp" media="(min-width: 768px)" />
            <source srcset="./images/fv-bgi1.webp" type="image/webp" />
            <img
              src="images/mv-pc1.jpg"
              alt="グランピングサイトの様子"
              width="1440"
              height="814"
              decoding="async"
            />
          </picture>
        </li>
        <li class="p-mv__img">
          <picture class="p-mv__image">
            <source
              srcset="./images/mv-pc2.webp"
              type="image/webp"
              media="(min-width: 768px)"
            />
            <source srcset="./images/mv-sp2.webp" type="image/webp" />
            <img
              src="./images/mv-pc2.jpg"
              alt="グランピングサイトの様子"
              width="1440"
              height="814"
              decoding="async"
            />
          </picture>
        </li>
        <li class="p-mv__img">
          <picture class="p-mv__image">
            <source
              srcset="./images/mv-pc3.webp"
              type="image/webp"
              media="(min-width: 768px)"
            />
            <source srcset="./images/mv-sp3.webp" type="image/webp" />
            <img
              src="./images/mv-pc3.jpg"
              alt="グランピングサイトの様子"
              width="1440"
              height="814"
              decoding="async"
            />
          </picture>
        </li>
      </ul>
    </div>
    <section class="p-about l-inner">
      <div class="p-about__container">
        <div class="p-about__text">
          <h2 class="c-title">
            <span class="c-title__en" aria-hidden="true">About</span>
            <span class="c-title__ja">わたしたちについて</span>
          </h2>
          <h3>
            都会の喧騒から離れ、<br />
            自然の中で心と体を整える。
          </h3>
          <p>
            わたしたちは、自然の魅力や過ごし方を丁寧にご案内しながら、一人ひとりに合った滞在のかたちを一緒に見つけていくグランピング施設です。<br />
            アウトドアが初めての方でも安心してお過ごしいただけるよう、必要なアイテムを揃え、快適な時間をサポートしています。<br />
            日常を離れ、心ほどける時間をお楽しみください。
          </p>
        </div>
        <picture class="p-about__img">
          <source srcset="./images/about-pc.webp" type="image/webp" />
          <img
            src=".images/about-pc.jpg"
            alt="水辺のドームテント"
            width="460"
            height="320"
            loading="lazy"
            decoding="async"
          />
        </picture>
      </div>
    </section>
    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.7.1.js" defer></script>
    <script defer src="./js/script.js"></script>
  </body>
</html>
