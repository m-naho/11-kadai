<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <!-- meta情報 -->
    <title>Codo Assist｜自然に囲まれたグランピング体験を</title>
    <meta
      name="description"
      content="Codo Assistは、自然に囲まれた環境で快適に過ごせるグランピング施設です。焚き火やアウトドアクッキング、家族で楽しめる体験をご用意しています。"
    />
    <!-- ogp -->
    <meta
      property="og:title"
      content="Codo Assist｜自然に囲まれたグランピング体験を"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="./images/ogp.jpg" />
    <meta property="og:site_name" content="Codo Assist" />
    <meta
      property="og:description"
      content="Codo Assistは、自然に囲まれた環境で快適に過ごせるグランピング施設です。焚き火やアウトドアクッキング、家族で楽しめる体験をご用意しています。"
    />

    <meta name="robots" content="noindex, nofollow" />
    <!-- 検索エンジンにインデックスしないよう指示 -->
    <meta name="googlebot" content="noindex, nofollow" />
    <!-- Googleのクローラーにインデックスしないよう指示 -->
    <meta name="msnbot" content="noindex, nofollow" />
    <!-- Bingのクローラーにインデックスしないよう指示 -->
    <meta name="slurp" content="noindex, nofollow" />
    <!-- Yahooのクローラーにインデックスしないよう指示 -->
    <!-- ファビコン -->
    <link rel="icon" href=".images/favicon.svg" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css -->
    <link rel="stylesheet" href="./css/styles.min.css" />
  </head>
  <body>
    <!-- title -->
    <h2 class="c-title">
      <span class="c-title__en" aria-hidden="true">Service</span>
      <span class="c-title__ja">サービスについて</span>
    </h2>

    <!-- button -->
    <a href="#" class="c-button">More</a>

    <!-- service -->
    <div class="c-service">
      <h3 class="c-service__title">施設・グランピング利用</h3>
      <p class="c-service__text">
        自然に囲まれた環境の中で、快適にお過ごしいただけるグランピングテントをご用意しています。<br />
        寝具や空調、照明などの設備が整っており、アウトドア初心者の方でも安心してご利用いただけます。
      </p>
    </div>

    <!-- card -->
    <div class="c-card">
      <picture class="c-card__image">
        <source srcset="./images/card-image1.webp" type="image/webp" />
        <img
          src="./images/card-image1.jpg"
          alt="グランピングディナーの画像"
          width="320"
          height="200"
          loading="lazy"
          decoding="async"
        />
      </picture>
      <div class="c-card__body">
        <time datetime="2025-12-23">2025.12.23</time>
        <h3 class="c-card__title">
          【冬の新メニュー】寒い季節に楽しむ、グランピングディナーのご紹介
        </h3>
      </div>
    </div>

    <!-- アコーディオンメニュー -->
    <div class="c-accordion">
      <div class="c-accordion__container">
        <div class="c-accordion__q">
          <span class="c-accordion__label-q">Q.</span>
          <h3 class="c-accordion__title jsAccordionTitle">
            アウトドア初心者でも利用できますか？
          </h3>
        </div>

        <div class="c-accordion__a">
          <span class="c-accordion__label-a">A.</span>
          <div class="c-accordion__content">
            はい、問題なくご利用いただけます。テント設
            営や準備の必要がなく、必要な設備が揃ってい
            るため、初めての方でも気軽にグランピングを お楽しみいただけます。
          </div>
        </div>
      </div>
    </div>
    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="./js/script.min.js"></script>
  </body>
</html>
